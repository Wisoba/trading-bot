name: Trading Bot

on:
  schedule:
    - cron: '30 20 * * 1-5'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - run: pip install pandas numpy yfinance twilio

      - run: python bot.py
